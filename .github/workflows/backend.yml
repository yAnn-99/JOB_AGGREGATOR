name: backend

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend 

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci 

      - name: Type-check
        run: npx tsc --noEmit

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm test