name: frontend

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker: 
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose
        run: docker compose config --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images
        run: docker compose build

      - name: Smoke test
        run: | 
          docker compose up -d
          sleep 15
          docker compose ps
          docker compose logs
          docker compose down -v