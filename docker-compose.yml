services : 
  front : 
    build : 
      dockerfile : ./frontend/Dockerfile
    ports : 
      - "8080:8080"

  back : 
    build :
      dockerfile : ./backend/Dockerfile
    ports : 
      - "3000:3000"
  
  data : 
    build:
      dockerfile : ./data/Dockerfile

  db : 
    build : 
      dockerfile : ./backend/database/Dockerfile
    environment:
      MYSQL_ROOT_PASSWORD: example
    