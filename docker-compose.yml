services :
  front : 
    build : 
      context : ./frontend
      dockerfile : ./Dockerfile
    ports : 
      - "8080:8080"

  back : 
    build :
      context: ./backend
      dockerfile : ./Dockerfile
    ports : 
      - "3000:3000"
    env_file:
    - .env
    volumes:
      - ./certs:/usr/src/app/certs:ro
  
  data : 
    build:
      context : ./data
      dockerfile : ./Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment : 
      - URL=${URL}
    depends_on:
      - db

  db : 
    build :
      context : ./backend/database
      dockerfile : ./Dockerfile
    environment:
      - POSTGRES_PASSWORD=${PASSWORD}
      - POSTGRES_DB=db
    volumes:
      - db-data:/var/lib/pgsql/data

volumes:
  db-data: